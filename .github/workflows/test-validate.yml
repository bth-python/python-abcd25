name: Test and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup-python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --locked --all-extras --dev


  copy-tests:
    uses: python-bth/utils/.github/workflows/test.yml@main

  run-tests:
    needs: [setup-python, copy-tests]
    runs-on: ubuntu-latest
    steps:
      - name: "Run ruff"
        run: uvx ruff check src

      - name: "Run tests"
        run: uv run tester tests

